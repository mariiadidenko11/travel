<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>БезМеж — Увійти</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- 1. Design tokens -->
  <link rel="stylesheet" href="../../styles/variables.css" />
  <!-- 2. Reset + primitives -->
  <link rel="stylesheet" href="../../styles/base.css" />
  <!-- 3. Page styles (login-specific only) -->
  <link rel="stylesheet" href="../../styles/pages/auth-login.css" />
</head>
<body>

<main class="auth" role="main">
  <div class="auth__card">

    <!-- Logo -->
    <a href="../../pages/app/dashboard.html" class="auth__logo" aria-label="БезМеж — на головну">
      <svg class="auth__logo-icon" viewBox="0 0 42 42" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="21" cy="21" r="19.5" stroke="#40B3E0" stroke-width="2"/>
        <path d="M10 29 C13 20, 17 17, 21 11 C25 17, 29 20, 32 29"
              stroke="#40B3E0" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="21" cy="11" r="2.4" fill="#40B3E0"/>
        <path d="M30 10 L34 8 L32 12"
              stroke="#40B3E0" stroke-width="1.4"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="auth__logo-text">БезМеж</span>
    </a>

    <!-- Heading -->
    <h1 class="auth__heading">З поверненням!</h1>
    <p  class="auth__sub">Ваша наступна пригода вже чекає</p>

    <!-- Form -->
    <form class="auth__form" novalidate>

      <!-- Email -->
      <div class="auth__field">
        <input
          class="auth__input"
          type="email" name="email" id="email"
          placeholder="Введіть вашу пошту"
          autocomplete="email" required
        />
      </div>

      <!-- Password -->
      <div class="auth__field">
        <input
          class="auth__input auth__input--password"
          type="password" name="password" id="password"
          placeholder="Введіть ваш пароль"
          autocomplete="current-password" required
        />
        <button type="button" class="auth__eye" id="togglePassword" aria-label="Показати пароль">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- Remember me + Forgot password -->
      <div class="auth__row">
        <label class="auth__remember">
          <input class="auth__remember-checkbox" type="checkbox" name="remember" id="remember" />
          <span class="auth__remember-label">Запам'ятайте мене</span>
        </label>
        <a href="forgot-password.html" class="auth__forgot">Забули пароль?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="auth__submit">Увійти</button>

    </form>

    <!-- Footer link -->
    <p class="auth__footer-text">
      Новий користувач? <a href="register.html">Зареєструватися</a>
    </p>

  </div>
</main>

<script>
  // Password visibility toggle
  const toggleBtn = document.getElementById('togglePassword');
  const pwdInput  = document.getElementById('password');
  const eyeIcon   = document.getElementById('eyeIcon');

  const ICON_OFF = `
    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
    <line x1="1" y1="1" x2="23" y2="23"/>
  `;
  const ICON_ON = `
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
    <circle cx="12" cy="12" r="3"/>
  `;

  toggleBtn.addEventListener('click', () => {
    const visible     = pwdInput.type === 'text';
    pwdInput.type     = visible ? 'password' : 'text';
    eyeIcon.innerHTML = visible ? ICON_OFF : ICON_ON;
    toggleBtn.setAttribute('aria-label', visible ? 'Показати пароль' : 'Приховати пароль');
  });

  // Basic form submit → redirect to dashboard
  document.querySelector('.auth__form').addEventListener('submit', e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    if (!email || !pass) return;
    window.location.href = '../../pages/app/dashboard.html';
  });
</script>

</body>
</html>
