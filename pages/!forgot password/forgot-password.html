<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>БезМеж — Змінити пароль</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
/* ============================================================
   БезМеж — Design System Variables (shared across all pages)
   ============================================================ */
:root {
  --primary:       #40B3E0;
  --primary-dark:  #2a9cc8;
  --dark:          #1A1A1A;
  --gray:          #757575;
  --gray-light:    #A0A0A0;
  --bg:            #F5F7F9;
  --white:         #FFFFFF;
  --border:        #D9D9D9;
  --input-bg:      #F2F4F6;
  --radius-md:     16px;
  --radius-lg:     20px;
  --radius-xl:     28px;
}

/* ─── Reset ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--dark);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}

/* ─── Auth wrapper ──────────────────────────────────────────── */
.auth {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Card ────────────────────────────────────────────────────── */
.auth__card {
  width: 100%;
  background: var(--white);
  border-radius: var(--radius-xl);
  box-shadow:
    0 8px 48px rgba(0,0,0,.10),
    0 2px 12px rgba(0,0,0,.06);
  padding: 40px 40px 36px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Logo ─────────────────────────────────────────────────────── */
.auth__logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
  text-decoration: none;
}
.auth__logo-icon { width: 40px; height: 40px; flex-shrink: 0; }
.auth__logo-text {
  font-size: 26px;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -.4px;
}

/* ── Form ─────────────────────────────────────────────────────── */
.auth__form {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Field ────────────────────────────────────────────────────── */
.auth__field { position: relative; width: 100%; }

.auth__input {
  width: 100%;
  background: var(--input-bg);
  border: 1.5px solid transparent;
  border-radius: var(--radius-md);
  padding: 15px 44px 15px 18px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  color: var(--dark);
  outline: none;
  transition: border-color .2s, background .2s, box-shadow .2s;
}
.auth__input::placeholder { color: var(--gray-light); font-weight: 400; }
.auth__input:hover  { background: #edf0f3; }
.auth__input:focus  {
  background: var(--white);
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(64,179,224,.12);
}

/* ── Eye toggle ───────────────────────────────────────────────── */
.auth__eye {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--gray-light);
  display: flex;
  align-items: center;
  padding: 4px;
  transition: color .18s;
}
.auth__eye:hover { color: var(--primary); }
.auth__eye svg   { width: 18px; height: 18px; }

/* ── Submit button ────────────────────────────────────────────── */
.auth__submit {
  width: 100%;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  padding: 16px;
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, transform .18s, box-shadow .2s;
  margin-top: 4px;
  box-shadow: 0 4px 20px rgba(64,179,224,.35);
  letter-spacing: .1px;
}
.auth__submit:hover {
  background: var(--primary-dark);
  box-shadow: 0 6px 24px rgba(64,179,224,.45);
  transform: translateY(-1px);
}
.auth__submit:active { transform: translateY(0); }

/* ── Back link ────────────────────────────────────────────────── */
.auth__back {
  margin-top: 20px;
  font-size: 14px;
  color: var(--gray);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: color .18s;
}
.auth__back:hover { color: var(--primary); }
.auth__back svg   { width: 15px; height: 15px; flex-shrink: 0; }

/* ─── Responsive ─────────────────────────────────────────────── */
@media (max-width: 520px) {
  .auth__card {
    padding: 32px 22px 28px;
    border-radius: var(--radius-lg);
  }
  .auth__logo-text { font-size: 22px; }
}
  </style>
</head>
<body>

<main class="auth" role="main">
  <div class="auth__card">

    <!-- ── Logo ─────────────────────────────────────────── -->
    <a href="index.html" class="auth__logo" aria-label="БезМеж — на головну">
      <svg class="auth__logo-icon" viewBox="0 0 42 42" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="21" cy="21" r="19.5" stroke="#40B3E0" stroke-width="2"/>
        <path d="M10 29 C13 20, 17 17, 21 11 C25 17, 29 20, 32 29"
              stroke="#40B3E0" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="21" cy="11" r="2.4" fill="#40B3E0"/>
        <path d="M30 10 L34 8 L32 12"
              stroke="#40B3E0" stroke-width="1.4"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="auth__logo-text">БезМеж</span>
    </a>

    <!-- ── Form ─────────────────────────────────────────── -->
    <form class="auth__form" novalidate id="resetForm">

      <!-- New password -->
      <div class="auth__field">
        <input
          class="auth__input"
          type="password"
          name="password"
          id="newPassword"
          placeholder="Новий пароль"
          autocomplete="new-password"
          required
        />
        <button type="button" class="auth__eye"
                id="toggleNew" aria-label="Показати новий пароль">
          <svg id="eyeNew" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
                     a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
                     a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- Confirm new password -->
      <div class="auth__field">
        <input
          class="auth__input"
          type="password"
          name="confirmPassword"
          id="confirmPassword"
          placeholder="Повторіть новий пароль"
          autocomplete="new-password"
          required
        />
        <button type="button" class="auth__eye"
                id="toggleConfirm" aria-label="Показати підтвердження пароля">
          <svg id="eyeConfirm" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
                     a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
                     a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- Submit -->
      <button type="submit" class="auth__submit">Змінити пароль</button>

    </form>

    <!-- ── Back to login ─────────────────────────────────── -->
    <a href="login.html" class="auth__back" aria-label="Повернутися до входу">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Повернутися до входу
    </a>

  </div><!-- /card -->
</main>

<script>
  // ── Generic password toggle factory ────────────────────────
  function makeToggle(btnId, inputId, iconId) {
    const btn   = document.getElementById(btnId);
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);

    const OFF = `
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
               a18.45 18.45 0 0 1 5.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8
               a18.5 18.5 0 0 1-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    `;
    const ON = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    `;

    btn.addEventListener('click', () => {
      const visible    = input.type === 'text';
      input.type       = visible ? 'password' : 'text';
      icon.innerHTML   = visible ? OFF : ON;
      btn.setAttribute('aria-label',
        visible ? btn.getAttribute('aria-label').replace('Приховати','Показати')
                : btn.getAttribute('aria-label').replace('Показати','Приховати'));
    });
  }

  makeToggle('toggleNew',     'newPassword',     'eyeNew');
  makeToggle('toggleConfirm', 'confirmPassword', 'eyeConfirm');
</script>

</body>
</html>
